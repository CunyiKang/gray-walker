<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>灰域行者 — 内心对话室</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
<style id="theme-styles">
:root {
  --bg-primary:#050508; --bg-secondary:#0a0a0f; --bg-card:rgba(10,10,15,0.95);
  --bg-card-alt:rgba(15,15,22,0.97); --bg-therapist:rgba(20,20,30,0.97);
  --bg-grounding:rgba(5,5,8,0.98); --bg-input:rgba(200,196,184,0.03);
  --bg-input-hover:rgba(200,196,184,0.07); --border:rgba(200,196,184,0.15);
  --border-light:rgba(200,196,184,0.08); --border-hover:rgba(200,196,184,0.4);
  --text-primary:#c8c4b8; --text-secondary:#d4cfc4; --text-dim:#7a7870;
  --text-danger:#c0392b; --accent-red:#c0392b; --accent-blue:#2980b9;
  --accent-green:#27ae60; --accent-yellow:#f39c12; --accent-purple:#af7ac5;
  --accent-pink:#e91e63; --accent-orange:#e67e22; --accent-cyan:#5dade2;
  --scan-bg:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.12) 2px,rgba(0,0,0,0.12) 4px);
  --noise-opacity:0.03;
  --screen-gradient:radial-gradient(ellipse at center,#0f0f18 0%,#050508 70%);
  --end-gradient:radial-gradient(ellipse at center,#0f0f18 0%,#050508 100%);
  --header-bg:rgba(10,10,15,0.85); --btn-bg:rgba(200,196,184,0.08);
  --btn-bg-hover:rgba(200,196,184,0.15); --summary-card-bg:rgba(200,196,184,0.04);
  --progress-done:rgba(200,196,184,0.7); --progress-current:rgba(200,196,184,1);
  --choice-letter-border:rgba(200,196,184,0.3); --choice-letter-border-hover:rgba(200,196,184,1);
  --g5-border:rgba(200,196,184,0.2); --breath-border:rgba(200,196,184,0.3);
  --result-border:rgba(200,196,184,0.15); --result-voices-border:rgba(200,196,184,0.1);
  --voice-bg:rgba(8,8,14,0.95); --tq-bg:rgba(200,196,184,0.04);
  --tq-bg-hover:rgba(200,196,184,0.09); --g5-item-bg:transparent;
  --grounding-text-bg:rgba(231,76,60,0.05); --grounding-text-border:rgba(231,76,60,0.15);
  --grounding-text-color:#e74c3c; --notes-bg:rgba(46,204,113,0.05);
  --notes-border:rgba(46,204,113,0.15); --notes-color:#27ae60;
  --therapist-card-bg:rgba(25,25,38,0.97);
  --intro-glow:rgba(192,57,43,0.08);
}
[data-theme="clarity"] {
  --bg-primary:#f7f5f0; --bg-secondary:#eeeae1; --bg-card:rgba(255,255,255,0.93);
  --bg-card-alt:rgba(255,253,248,0.97); --bg-therapist:rgba(255,255,255,0.97);
  --bg-grounding:rgba(247,245,240,0.98); --bg-input:rgba(80,70,55,0.04);
  --bg-input-hover:rgba(80,70,55,0.09); --border:rgba(80,70,55,0.18);
  --border-light:rgba(80,70,55,0.1); --border-hover:rgba(80,70,55,0.4);
  --text-primary:#2c2416; --text-secondary:#3d3222; --text-dim:#8a7d68;
  --text-danger:#a83228; --accent-red:#a83228; --accent-blue:#1a6fa8;
  --accent-green:#1e8a50; --accent-yellow:#c07810; --accent-purple:#6e2a8a;
  --accent-pink:#c4186a; --accent-orange:#b86010; --accent-cyan:#1a7a9a;
  --scan-bg:none; --noise-opacity:0;
  --screen-gradient:radial-gradient(ellipse at center,#faf8f2 0%,#eeeae1 100%);
  --end-gradient:radial-gradient(ellipse at center,#faf8f2 0%,#eeeae1 100%);
  --header-bg:rgba(255,255,255,0.88); --btn-bg:rgba(80,70,55,0.07);
  --btn-bg-hover:rgba(80,70,55,0.14); --summary-card-bg:rgba(80,70,55,0.04);
  --progress-done:rgba(80,70,55,0.6); --progress-current:rgba(44,36,22,1);
  --choice-letter-border:rgba(80,70,55,0.3); --choice-letter-border-hover:rgba(44,36,22,1);
  --g5-border:rgba(80,70,55,0.2); --breath-border:rgba(80,70,55,0.3);
  --result-border:rgba(80,70,55,0.15); --result-voices-border:rgba(80,70,55,0.1);
  --voice-bg:rgba(255,255,255,0.96); --tq-bg:rgba(80,70,55,0.04);
  --tq-bg-hover:rgba(80,70,55,0.09); --g5-item-bg:transparent;
  --grounding-text-bg:rgba(168,50,40,0.05); --grounding-text-border:rgba(168,50,40,0.15);
  --grounding-text-color:#a83228; --notes-bg:rgba(30,138,80,0.05);
  --notes-border:rgba(30,138,80,0.15); --notes-color:#1e8a50;
  --therapist-card-bg:rgba(255,255,255,0.97);
  --intro-glow:rgba(168,50,40,0.06);
}
* { box-sizing:border-box; margin:0; padding:0 }
html,body { width:100%; height:100%; overflow:hidden; background:var(--bg-primary); color:var(--text-primary); font-family:'Noto Serif SC',serif; user-select:none; transition:background .5s,color .5s }
.scanlines { position:fixed; inset:0; background:var(--scan-bg); pointer-events:none; z-index:9999; animation:scanMove 8s linear infinite }
@keyframes scanMove { from{background-position:0 0} to{background-position:0 100px} }
.noise-overlay { position:fixed; inset:0; opacity:var(--noise-opacity); background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); pointer-events:none; z-index:9998; transition:opacity .5s }
#voice-layer { position:fixed; inset:0; z-index:100; pointer-events:none; overflow:hidden }
.voice-bubble { position:absolute; padding:10px 16px; border-radius:4px; font-size:13px; line-height:1.65; max-width:280px; min-width:180px; border-left:3px solid; background:var(--voice-bg); backdrop-filter:blur(6px); animation:bubbleIn .4s ease forwards; box-shadow:0 4px 24px rgba(0,0,0,0.4); transition:background .5s }
@keyframes bubbleIn { from{opacity:0;transform:scale(.85) translateY(8px)} to{opacity:1;transform:scale(1) translateY(0)} }
.voice-bubble.pulse { animation:bubbleIn .4s ease forwards,pulse2 2.5s ease-in-out .4s infinite }
@keyframes pulse2 { 0%,100%{box-shadow:0 4px 24px rgba(0,0,0,0.4)} 50%{box-shadow:0 4px 32px rgba(255,255,255,0.06)} }
.voice-bubble.fading { animation:bubbleFade .8s ease forwards }
@keyframes bubbleFade { to{opacity:0;transform:translateY(-12px) scale(.92)} }
.voice-volition{ border-color:#5d8aa8; color:#5d8aa8 }
.voice-inland  { border-color:#c0392b; color:#c0392b; font-style:italic }
.voice-authority{ border-color:#27ae60; color:#27ae60 }
.voice-logic   { border-color:#2980b9; color:#2980b9 }
.voice-empathy { border-color:#af7ac5; color:#af7ac5 }
.voice-electro { border-color:#f39c12; color:#f39c12 }
.voice-half    { border-color:#922b21; color:#922b21 }
.voice-drama  { border-color:#e91e63; color:#e91e63 }
.voice-suggestion{ border-color:#e67e22; color:#e67e22 }
.voice-pale   { border-color:#7f8c8d; color:#7f8c8d; font-style:italic }
.voice-command { border-color:#c0392b; color:#e74c3c; background:rgba(192,57,43,0.12)!important }
.voice-thought { border-color:#8e44ad; color:#d7bde2; font-style:italic; border-style:dashed }
[data-theme="clarity"] .voice-volition{ border-color:#3a6e8a; color:#3a6e8a }
[data-theme="clarity"] .voice-inland  { border-color:#a83228; color:#a83228 }
[data-theme="clarity"] .voice-authority{ border-color:#1e8a50; color:#1e8a50 }
[data-theme="clarity"] .voice-logic   { border-color:#1a6fa8; color:#1a6fa8 }
[data-theme="clarity"] .voice-empathy { border-color:#8a4a9a; color:#8a4a9a }
[data-theme="clarity"] .voice-electro { border-color:#c07810; color:#c07810 }
[data-theme="clarity"] .voice-half    { border-color:#8a2a20; color:#8a2a20 }
[data-theme="clarity"] .voice-drama   { border-color:#c4186a; color:#c4186a }
[data-theme="clarity"] .voice-suggestion{ border-color:#b86010; color:#b86010 }
[data-theme="clarity"] .voice-pale    { border-color:#7a7068; color:#7a7068 }
[data-theme="clarity"] .voice-command { border-color:#a83228; color:#a83228; background:rgba(168,50,40,0.08)!important }
[data-theme="clarity"] .voice-thought { border-color:#6e2a8a; color:#6e2a8a; border-style:dashed }
.voice-name { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:2px; margin-bottom:4px; opacity:.7 }
.voice-text { font-size:13px; line-height:1.5 }
.voice-tag  { font-size:9px; letter-spacing:1px; padding:2px 5px; border-radius:2px; background:rgba(192,57,43,0.2); color:#e74c3c; margin-bottom:4px; display:inline-block }
[data-theme="clarity"] .voice-tag { background:rgba(168,50,40,0.15); color:#a83228 }
#theme-toggle { position:fixed; top:16px; right:16px; z-index:500; display:flex; align-items:center; gap:8px; background:var(--bg-card); border:1px solid var(--border); padding:8px 14px; border-radius:3px; cursor:pointer; font-size:12px; color:var(--text-dim); font-family:'Noto Serif SC',serif; letter-spacing:1px; transition:all .3s; backdrop-filter:blur(8px) }
#theme-toggle:hover { border-color:var(--border-hover); color:var(--text-primary); background:var(--bg-input-hover) }
#theme-toggle .dot { width:8px; height:8px; border-radius:50%; background:#2980b9; flex-shrink:0; transition:background .5s }
[data-theme="clarity"] #theme-toggle .dot { background:#1e8a50 }
.screen { position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:10; overflow:hidden }
.hidden { display:none!important }
#intro-screen { background:var(--screen-gradient); transition:background .5s }
#intro-screen::before { content:''; position:absolute; inset:0; background:radial-gradient(ellipse at center,var(--intro-glow) 0%,transparent 60%); pointer-events:none }
.intro-title { font-family:'Ma Shan Zheng',cursive; font-size:clamp(48px,8vw,96px); color:var(--text-primary); text-align:center; letter-spacing:12px; text-shadow:0 0 80px rgba(0,0,0,0.4); animation:it 3s ease forwards; opacity:0; position:relative; z-index:1; transition:color .5s }
@keyframes it{0%{opacity:0;letter-spacing:30px;filter:blur(8px)}60%{opacity:1;letter-spacing:14px;filter:blur(0)}100{opacity:1;letter-spacing:12px}}
.intro-subtitle{margin-top:24px;font-size:15px;color:var(--text-dim);letter-spacing:6px;opacity:0;animation:fadeIn 2s ease 1.5s forwards;transition:color .5s;position:relative;z-index:1}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.intro-start{margin-top:60px;padding:14px 48px;background:transparent;border:1px solid var(--text-dim);color:var(--text-primary);font-family:'Noto Serif SC',serif;font-size:14px;letter-spacing:4px;cursor:pointer;transition:all .3s;opacity:0;animation:fadeIn 2s ease 2.5s forwards;position:relative;z-index:1}
.intro-start:hover{background:var(--bg-input-hover);border-color:var(--text-primary);transform:translateY(-2px)}
.intro-warning{margin-top:40px;font-size:11px;color:var(--text-dim);opacity:0;animation:fadeIn 2s ease 3s forwards;max-width:520px;text-align:center;line-height:1.9;transition:color .5s;position:relative;z-index:1}
#therapist-screen{background:radial-gradient(ellipse at center bottom,#12121f 0%,var(--bg-primary) 100%);z-index:200}
.therapist-panel{max-width:660px;width:92%;background:var(--therapist-card-bg);border:1px solid var(--border);padding:40px 48px;border-radius:3px;box-shadow:0 8px 60px rgba(0,0,0,.5);max-height:88vh;overflow-y:auto;transition:all .5s}
.therapist-label{font-size:10px;letter-spacing:4px;color:var(--text-dim);text-transform:uppercase;margin-bottom:20px;transition:color .5s}
.therapist-title{font-size:22px;font-weight:700;color:var(--text-primary);margin-bottom:16px;line-height:1.4;transition:color .5s}
.therapist-text{font-size:15px;line-height:2;color:var(--text-secondary);margin-bottom:28px;transition:color .5s}
.therapist-questions{margin-bottom:32px}
.tq{padding:12px 16px;background:var(--tq-bg);border-left:2px solid var(--text-dim);margin-bottom:8px;font-size:14px;color:var(--text-secondary);line-height:1.7;transition:all .3s}
.tq:hover{background:var(--tq-bg-hover);border-left-color:var(--text-primary)}
.therapist-continue{width:100%;padding:13px;background:var(--btn-bg);border:1px solid var(--border);color:var(--text-primary);font-family:'Noto Serif SC',serif;font-size:14px;letter-spacing:3px;cursor:pointer;transition:all .3s}
.therapist-continue:hover{background:var(--btn-bg-hover);border-color:var(--text-primary)}
#grounding-screen{background:var(--bg-grounding);z-index:250}
.grounding-container{text-align:center;max-width:600px;width:92%}
.breath-circle{width:160px;height:160px;border-radius:50%;border:2px solid var(--breath-border);display:flex;align-items:center;justify-content:center;margin:0 auto 32px;animation:bc 12s ease-in-out infinite;font-size:16px;letter-spacing:3px;color:var(--text-dim);transition:border-color .5s,color .5s}
@keyframes bc{0%{transform:scale(.7);opacity:.4;border-color:rgba(200,196,184,.1)}20%{transform:scale(1);opacity:1}50%{transform:scale(1.3);opacity:1}70%{transform:scale(1);opacity:1}100%{transform:scale(.7);opacity:.4}}
.grounding-step{font-size:18px;color:var(--text-primary);margin-bottom:14px;letter-spacing:2px;opacity:0;animation:fadeIn 1s ease forwards;transition:color .5s}
.grounding-hint{font-size:13px;color:var(--text-dim);margin-bottom:28px;line-height:1.8;transition:color .5s}
.grounding-5{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;max-width:480px;margin:0 auto 28px}
.g5-item{padding:10px 6px;border:1px solid var(--g5-border);font-size:12px;color:var(--text-dim);text-align:center;line-height:1.5;opacity:0;animation:fadeIn .5s ease forwards;transition:all .5s}
.grounding-exit{margin-top:32px;padding:11px 36px;background:transparent;border:1px solid var(--text-dim);color:var(--text-primary);font-family:'Noto Serif SC',serif;font-size:13px;letter-spacing:3px;cursor:pointer;transition:all .3s}
.grounding-exit:hover{background:var(--bg-input-hover);border-color:var(--text-primary)}
#game-screen{background:var(--bg-secondary);justify-content:flex-start;padding-top:0;overflow:hidden}
.scene-header{width:100%;padding:16px 28px;display:flex;align-items:center;justify-content:space-between;background:var(--header-bg);border-bottom:1px solid var(--border-light);position:relative;z-index:50;backdrop-filter:blur(10px);transition:all .5s}
.scene-name{font-size:11px;letter-spacing:3px;color:var(--text-dim);text-transform:uppercase;transition:color .5s}
.scene-progress{display:flex;gap:5px;align-items:center}
.progress-dot{width:8px;height:8px;border-radius:50%;background:rgba(200,196,184,.2);transition:all .5s}
.progress-dot.done{background:var(--progress-done)}.progress-dot.current{background:var(--progress-current);box-shadow:0 0 8px rgba(200,196,184,.5)}
.scene-main{flex:1;width:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 28px;position:relative;overflow-y:auto;overflow-x:hidden}
.scene-narrative{max-width:600px;width:100%;text-align:center}
.scene-location{font-size:10px;letter-spacing:5px;color:var(--text-dim);text-transform:uppercase;margin-bottom:20px;transition:color .5s}
.scene-prose{font-size:16px;line-height:1.8;color:var(--text-secondary);margin-bottom:10px;transition:color .5s}
.scene-warning{font-size:12px;color:var(--text-danger);margin-top:12px;font-style:italic;opacity:.85;line-height:1.6}
.choices-container{max-width:560px;width:100%;margin-top:36px;display:flex;flex-direction:column;gap:12px}
.choice-btn{padding:14px 22px;background:var(--bg-input);border:1px solid var(--border);color:var(--text-secondary);font-family:'Noto Serif SC',serif;font-size:15px;line-height:1.7;cursor:pointer;text-align:left;transition:all .3s;position:relative;overflow:hidden}
.choice-btn::before{content:'';position:absolute;left:0;top:0;width:0;height:100%;background:var(--bg-input-hover);transition:width .3s}
.choice-btn:hover::before{width:100%}.choice-btn:hover{border-color:var(--border-hover);color:var(--text-primary);transform:translateX(4px)}
.choice-letter{display:inline-block;width:24px;height:24px;border:1px solid var(--choice-letter-border);text-align:center;line-height:22px;font-size:12px;margin-right:12px;color:var(--text-dim);transition:all .3s;flex-shrink:0}
.choice-btn:hover .choice-letter{border-color:var(--choice-letter-border-hover);color:var(--text-primary)}
.choice-effect{font-size:11px;color:var(--text-dim);margin-top:4px;margin-left:36px}
.result-card{max-width:560px;width:92%;background:var(--bg-card-alt);border:1px solid var(--result-border);padding:32px 36px;margin-top:20px;opacity:0;animation:rca .8s ease .2s forwards;transition:all .5s}
@keyframes rca{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.result-title{font-size:17px;color:var(--text-primary);margin-bottom:14px;font-weight:700;transition:color .5s}
.result-text{font-size:15px;line-height:2;color:var(--text-secondary);margin-bottom:20px;transition:color .5s}
.result-voices{font-size:12px;color:var(--text-dim);border-top:1px solid var(--result-voices-border);padding-top:14px;line-height:1.8;transition:color .5s}
.confirm-btn{margin-top:24px;padding:11px 36px;background:var(--btn-bg);border:1px solid var(--border);color:var(--text-primary);font-family:'Noto Serif SC',serif;font-size:14px;letter-spacing:3px;cursor:pointer;transition:all .3s}
.confirm-btn:hover{background:var(--btn-bg-hover);border-color:var(--text-primary)}
#end-screen{background:var(--end-gradient);transition:background .5s}
.end-title{font-family:'Ma Shan Zheng',cursive;font-size:48px;color:var(--text-primary);letter-spacing:8px;margin-bottom:14px;transition:color .5s}
.end-sub{font-size:14px;color:var(--text-dim);letter-spacing:4px;margin-bottom:36px;transition:color .5s}
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;max-width:600px;width:92%;margin-bottom:28px}
.summary-card{background:var(--summary-card-bg);border:1px solid var(--border-light);padding:18px;transition:all .5s}
.summary-card-title{font-size:10px;letter-spacing:3px;color:var(--text-dim);text-transform:uppercase;margin-bottom:8px;transition:color .5s}
.summary-card-value{font-size:26px;font-weight:700;color:var(--text-primary);transition:color .5s}
.summary-card-sub{font-size:11px;color:var(--text-dim);margin-top:4px;transition:color .5s}
.end-therapy-note{max-width:500px;text-align:center;font-size:13px;color:var(--text-dim);line-height:2;margin-bottom:22px;transition:color .5s}
.end-actions{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}
.restart-btn{padding:11px 36px;background:transparent;border:1px solid var(--text-dim);color:var(--text-primary);font-family:'Noto Serif SC',serif;font-size:13px;letter-spacing:3px;cursor:pointer;transition:all .3s}
.restart-btn:hover{background:var(--bg-input-hover);border-color:var(--text-primary)}
.report-btn{padding:11px 28px;background:var(--btn-bg);border:1px solid var(--border);color:var(--text-primary);font-family:'Noto Serif SC',serif;font-size:13px;letter-spacing:3px;cursor:pointer;transition:all .3s}
.report-btn:hover{background:var(--btn-bg-hover);border-color:var(--text-primary)}
#report-overlay{position:fixed;inset:0;background:rgba(5,5,8,.88);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px}
#report-panel{background:var(--bg-card-alt);border:1px solid var(--border);width:100%;max-width:760px;max-height:88vh;overflow-y:auto;padding:36px 44px;position:relative;transition:all .5s}
.report-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:28px;padding-bottom:20px;border-bottom:1px solid var(--border-light)}
.report-title{font-size:21px;font-weight:700;color:var(--text-primary);margin-bottom:5px;transition:color .5s}
.report-subtitle{font-size:12px;color:var(--text-dim);letter-spacing:2px;transition:color .5s}
.report-close{background:none;border:none;color:var(--text-dim);font-size:22px;cursor:pointer;padding:3px 8px;transition:color .3s;flex-shrink:0}
.report-close:hover{color:var(--text-primary)}
.report-section{margin-bottom:24px}
.report-section-title{font-size:11px;letter-spacing:3px;color:var(--text-dim);text-transform:uppercase;margin-bottom:12px;padding-bottom:7px;border-bottom:1px solid var(--border-light);transition:color .5s}
.report-meta{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:6px}
.report-meta-item{background:var(--bg-input);border:1px solid var(--border-light);padding:11px 13px;transition:all .5s}
.report-meta-label{font-size:10px;color:var(--text-dim);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;transition:color .5s}

<body>
<div class="noise-overlay"></div>
<div class="scanlines"></div>
<div id="theme-toggle" onclick="toggleTheme()">
  <div class="dot"></div>
  <span id="theme-label">清新版</span>
</div>
<div id="voice-layer" class="hidden"></div>

<div id="intro-screen" class="screen">
  <div class="intro-title">灰域行者</div>
  <div class="intro-subtitle">内心对话室 &middot; 治疗游戏</div>
  <button class="intro-start" onclick="startGame()">进入内心</button>
  <div class="intro-warning">本游戏模拟真实精神分裂谱系体验（幻听、思维障碍、关系妄想、命令性幻听等），仅供治疗参考，不能替代专业诊疗。如感到强烈不适，请告知治疗师或使用「安全出口」暂停。</div>
</div>

<div id="therapist-screen" class="screen hidden">
  <div class="therapist-panel">
    <div class="therapist-label">/// 治疗师观察点 ///</div>
    <div class="therapist-title" id="therapist-title"></div>
    <div class="therapist-text" id="therapist-text"></div>
    <div class="therapist-questions" id="therapist-questions"></div>
    <button class="therapist-continue" onclick="continueGame()">继续旅程</button>
  </div>
</div>

<div id="grounding-screen" class="screen hidden">
  <div class="grounding-container" id="grounding-content"></div>
</div>

<div id="game-screen" class="screen hidden">
  <div class="scene-header">
    <div class="scene-name" id="scene-name"></div>
    <div class="scene-progress" id="scene-progress"></div>
  </div>
  <div class="scene-main" id="scene-main"></div>
</div>

<div id="end-screen" class="screen hidden">
  <div class="end-title">旅程结束</div>
  <div class="end-sub">SESSION COMPLETE</div>
  <div class="summary-grid" id="end-summary"></div>
  <div class="end-therapy-note" id="end-therapy-note"></div>
  <div class="end-actions">
    <button class="report-btn" onclick="showReport()">&#128196; 导出治疗记录</button>
    <button class="restart-btn" onclick="restartGame()">重新开始</button>
  </div>
</div>

<div id="report-overlay" class="hidden" onclick="if(event.target===this)closeReport()">
  <div id="report-panel">
    <div class="report-header">
      <div>
        <div class="report-title">灰域行者 &middot; 治疗记录</div>
        <div class="report-subtitle">GREY ZONE WALKER &middot; THERAPY SESSION REPORT</div>
      </div>

    </div>

      <button class="restart-btn" onclick="closeReport()">关闭</button>
    </div>
    <div class="print-note">打印后可保存为纸质治疗记录</div>
  </div>
</div>

// ============================================================
// THEME
// ============================================================
function toggleTheme() {
  var body = document.body;
  var label = document.getElementById('theme-label');
  if (state.currentTheme === "walker") {
    body.setAttribute("data-theme","clarity"); state.currentTheme = "clarity"; label.textContent = "阴郁版";
  } else {
    body.setAttribute("data-theme","walker"); state.currentTheme = "walker"; label.textContent = "清新版";
  }
}

// ============================================================
// UTILITY
// ============================================================
function escapeHtml(s) {
  if (s == null) return "";
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function getTimestamp() {
  var d = new Date();
  var p = function(n){ return String(n).padStart(2,"0"); };
  return d.getFullYear()+"-"+p(d.getMonth()+1)+"-"+p(d.getDate())+" "+p(d.getHours())+":"+p(d.getMinutes());
}

// ============================================================
// VOICE SYSTEM
// ============================================================
var BUBBLE_COLS = [
  {left:"3%",top:"10%"},{right:"3%",top:"10%"},
  {left:"3%",top:"30%"},{right:"3%",top:"30%"},
  {left:"3%",top:"50%"},{right:"3%",top:"50%"},
  {left:"8%",bottom:"22%"},{right:"8%",bottom:"22%"},
  {left:"8%",bottom:"8%"},{right:"8%",bottom:"8%"}
];
var bubbleSlotUsed = [];

function getAvailableSlot() {
  for (var i = 0; i < BUBBLE_COLS.length; i++) {
    if (!bubbleSlotUsed[i]) { bubbleSlotUsed[i] = true; return { slot: BUBBLE_COLS[i], index: i }; }
  }
  var ri = Math.floor(Math.random() * BUBBLE_COLS.length);
  return { slot: BUBBLE_COLS[ri], index: ri };
}
function releaseSlot(idx) { if (idx >= 0 && idx < bubbleSlotUsed.length) bubbleSlotUsed[idx] = false; }

function spawnVoice(personaKey, text, pos, opts) {
  opts = opts || {};
  var layer = document.getElementById("voice-layer");
  if (!layer || layer.classList.contains("hidden")) return;
  var p = PERSONAS[personaKey]; if (!p) return;

  var existing = layer.querySelectorAll(".voice-bubble:not(.fading)");
  if (existing.length >= 5) {
    existing[0].classList.add("fading");
    setTimeout(function(){ if(existing[0].parentNode) existing[0].remove(); }, 800);
  }

  var { slot, index } = getAvailableSlot();
  var b = document.createElement("div");
  b.className = "voice-bubble voice-" + personaKey + (opts.pulse ? " pulse" : "");
  b.style.left   = slot.left   || "auto";
  b.style.right  = slot.right  || "auto";
  b.style.top    = slot.top    || "auto";
  b.style.bottom = slot.bottom || "auto";
  b.style.zIndex = 110 + Math.floor(Math.random() * 15);
  b.dataset.slotIndex = index;

  var isCmd = (personaKey === "command");
  var tagHtml = isCmd ? "<div class=\"voice-tag\">&#9888; 命令性幻听</div>" : "";
  b.innerHTML = "<div class=\"voice-name\">" + p.name + "</div>" + tagHtml + "<div class=\"voice-text\">" + escapeHtml(text) + "</div>";
  layer.appendChild(b);
  state.voiceHistory.push({ persona: personaKey, text: text, scene: state.currentScene });

  var duration = opts.duration || (opts.pulse ? 15000 : 10000);
  setTimeout(function() {
    if (b.parentNode) {
      b.classList.add("fading");
      setTimeout(function() { if(b.parentNode){ b.remove(); releaseSlot(parseInt(b.dataset.slotIndex)||0); } }, 800);
    }
  }, duration);
  return b;
}

function clearVoices() {
  var layer = document.getElementById("voice-layer");
  if (layer) { layer.innerHTML = ""; bubbleSlotUsed = []; }
}

// ============================================================
// EFFECTS
// ============================================================
function triggerGlitch(level) {
  var main = document.getElementById("game-screen");
  if (level >= 3) { main.classList.add("screen-shake-severe"); setTimeout(function(){ main.classList.remove("screen-shake-severe"); }, 800); }
  else if (level >= 2) { main.classList.add("screen-shake"); setTimeout(function(){ main.classList.remove("screen-shake"); }, 300); }
}
function triggerHallEffect(eff) {
  if (!eff) return;
  if (eff.type === "text") {
    var el = document.createElement("div"); el.className = "retinal-burn";
    if (eff.pos === "center") { el.style.left = "50%"; el.style.top = "50%"; el.style.transform = "translate(-50%,-50%)"; }
    else if (eff.pos === "right") { el.style.right = "5%"; el.style.top = "10%"; }
    else { el.style.left = "5%"; el.style.top = "10%"; }
    el.textContent = eff.text;
    el.style.animation = "rb " + eff.duration + "ms ease-out forwards";
    document.body.appendChild(el);
    setTimeout(function(){ el.remove(); }, eff.duration);
  } else if (eff.type === "image") {
    var gs = document.getElementById("game-screen");
    gs.classList.add("hallucination-flicker");
    setTimeout(function(){ gs.classList.remove("hallucination-flicker"); }, 200);
  }
}
function triggerTextRun() {
  var msgs = ["你没有在做梦","墙后面有东西","关灯","它们在说你的名字","你不属于这里","你听到那个声音了吗","这是真的","这是你的错"];
  var r = document.createElement("div"); r.className = "text-run";
  r.textContent = msgs[Math.floor(Math.random() * msgs.length)];
  r.style.top = (20 + Math.random() * 60) + "%";
  r.style.fontSize = (10 + Math.random() * 7) + "px";
  r.style.animationDuration = (5 + Math.random() * 5) + "s";
  document.body.appendChild(r);
  setTimeout(function(){ r.remove(); }, 10000);
}

// ============================================================
// SCREEN MANAGEMENT
// ============================================================
function showScreen(id) {
  document.querySelectorAll(".screen").forEach(function(s){ s.classList.add("hidden"); });
  document.getElementById(id).classList.remove("hidden");
}
function updateProgress() {
  var c = document.getElementById("scene-progress"); if (!c) return;
  c.innerHTML = "";
  for (var i = 0; i < SCENES.length; i++) {
    var d = document.createElement("div"); d.className = "progress-dot";
    if (i < state.currentScene) d.classList.add("done");
    if (i === state.currentScene) d.classList.add("current");
    c.appendChild(d);
  }
}

// ============================================================
// GAME FLOW
// ============================================================
function renderScene() {
  var scene = SCENES[state.currentScene];
  showScreen("game-screen");
  document.getElementById("voice-layer").classList.remove("hidden");
  clearVoices();
  document.getElementById("scene-name").textContent = "场景 " + scene.id + " / " + scene.name;
  updateProgress();

  var main = document.getElementById("scene-main");
  var prose = scene.narrative.replace(/\n/g, "<br>");
  var warnHtml = scene.glitchLevel >= 3 ? '<div class="scene-warning">&#9888; 此场景含有命令性幻听元素，可能引起部分患者不安</div>' : '';
  main.innerHTML =
    '<div class="scene-narrative fade-in-up">' +
    '<div class="scene-location">' + escapeHtml(scene.location) + '</div>' +
    '<div class="scene-prose">' + prose + '</div>' + warnHtml +
    '</div>' +
    '<div class="choices-container" id="choices-container" style="opacity:0;"></div>';

  if (scene.glitchLevel >= 2) setTimeout(function(){ triggerGlitch(scene.glitchLevel); }, 1000);
  if (scene.hallEffect) setTimeout(function(){ triggerHallEffect(scene.hallEffect); }, 700);

  scene.voices.forEach(function(v, i) {
    setTimeout(function() {
      var qlist = QUOTES[v.persona] || [];
      var quote = qlist[Math.floor(Math.random() * qlist.length)];
      spawnVoice(v.persona, quote, v.pos, { pulse: v.repeat, duration: v.repeat ? 15000 : 10000 });
      if (scene.glitchLevel >= 2) setTimeout(function(){ triggerTextRun(); }, Math.random() * 2000 + 500);
    }, v.delay + 1500);
  });

  setTimeout(function() {
    var container = document.getElementById("choices-container");
    if (!container) return;
    container.style.opacity = "1";
    var btns = scene.choices.map(function(c, i) {
      return '<button class="choice-btn fade-in-up" style="animation-delay:' + (i * 0.1) + 's;" onclick="makeChoice(' + i + ')">' +
             '<span class="choice-letter">' + c.letter + '</span>' + escapeHtml(c.text) +
             (c.effect ? '<div class="choice-effect">' + escapeHtml(c.effect) + '</div>' : '') + '</button>';
    }).join("");
    var safetyBtn = document.createElement("button");
    safetyBtn.className = "choice-btn fade-in-up";
    safetyBtn.style.cssText = "border-color:rgba(192,57,43,.3);color:#c0392b;margin-top:8px;";
    safetyBtn.style.animationDelay = (scene.choices.length * 0.1 + 0.15) + "s";
    safetyBtn.innerHTML = '<span class="choice-letter" style="border-color:rgba(231,76,60,.4);color:#c0392b;">&#9670;</span>按下安全出口 · 5-4-3-2-1 grounding练习';
    safetyBtn.onclick = function(){ openGrounding(); };
    container.innerHTML = btns;
    container.appendChild(safetyBtn);
  }, 2500);
}

function makeChoice(index) {
  var scene = SCENES[state.currentScene];
  var choice = scene.choices[index];
  state.selectedChoices.push({
    sceneId: scene.id, sceneName: scene.name, choiceIndex: index,
    choiceText: choice.text, choiceLetter: choice.letter,
    outcome: choice.outcome,
    voices: choice.voices ? choice.voices.slice() : [],
    therapistNote: choice.therapistNote || "", groundingUsed: false
  });
  if (index === 0 || index === 1) state.score.awareness++;
  if (index === 1) state.score.connection++;
  if (index === 2 || index === 3) state.score.resilience++;
  state.score.voiceCount += choice.voices ? choice.voices.length : 0;

  var container = document.getElementById("choices-container");
  if (!container) return;
  container.innerHTML = "";
  var result = document.createElement("div"); result.className = "result-card";
  var voicesHtml = "";
  if (choice.voices && choice.voices.length) {
    var vLines = choice.voices.map(function(v) {
      var col = PERSONAS[v.persona] ? PERSONAS[v.persona].color : "#888";
      return '<span style="color:' + col + ';">[' + (PERSONAS[v.persona] ? PERSONAS[v.persona].name : v.persona) + ']</span> ' + escapeHtml(v.text);
    }).join("<br>");
    voicesHtml = '<div class="result-voices"><strong style="color:var(--text-primary);font-size:11px;letter-spacing:2px;">内心声音回应：</strong><br>' + vLines + '</div>';
  }
  result.innerHTML =
    '<div class="result-title">你的选择</div>' +
    '<div class="result-text">' + choice.outcome + '</div>' +
    voicesHtml +
    '<button class="confirm-btn" onclick="showTherapist()">与治疗师讨论</button>';
  container.appendChild(result);

  if (choice.voices) {
    var positions = [{left:"5%",top:"15%"},{right:"5%",top:"15%"},{left:"5%",bottom:"22%"},{right:"5%",bottom:"22%"}];
    choice.voices.forEach(function(v, i) {
      setTimeout(function(){ spawnVoice(v.persona, v.text, positions[i % positions.length], { pulse: true, duration: 12000 }); }, i * 1200);
    });
  }
}

function showTherapist() {
  var scene = SCENES[state.currentScene];
  showScreen("therapist-screen");
  document.getElementById("voice-layer").classList.add("hidden");
  clearVoices();
  document.getElementById("therapist-title").textContent = scene.therapist.title;
  document.getElementById("therapist-text").textContent = scene.therapist.text;
  document.getElementById("therapist-questions").innerHTML =
    scene.therapist.questions.map(function(q){ return '<div class="tq">&#10097; ' + q + '</div>'; }).join("");
}

function continueGame() {
  state.currentScene++;
  if (state.currentScene >= SCENES.length) showEndScreen();
  else renderScene();
}

// ============================================================
// GROUNDING
// ============================================================
function openGrounding() {
  state.groundingUsed++;
  if (state.selectedChoices.length > 0) {
    var last = state.selectedChoices[state.selectedChoices.length - 1];
    if (last.sceneId === SCENES[state.currentScene].id) last.groundingUsed = true;
  }
  showScreen("grounding-screen");
  document.getElementById("voice-layer").classList.add("hidden");
  clearVoices();

  var container = document.getElementById("grounding-content");
  container.innerHTML =
    '<div class="breath-circle" id="breath-circle"><span id="breath-label">吸气</span></div>' +
    '<div class="grounding-step" id="grounding-step" style="animation-delay:.5s;">5-4-3-2-1 感官练习</div>' +
    '<div class="grounding-hint" id="grounding-hint" style="animation-delay:1s;">跟随引导，慢慢来。把注意力带回这个房间。</div>' +
    '<div class="grounding-5" id="grounding-5"></div>' +
    '<button class="grounding-exit" onclick="closeGrounding()">我感觉好些了 &middot; 继续</button>';

  var breathLabel = document.getElementById("breath-label");
  var phases = ["吸气…","屏住…","呼气…"];
  var phase = 0;
  var breathInt = setInterval(function(){ phase = (phase + 1) % 3; breathLabel.textContent = phases[phase]; }, 4000);

  var senses = [
    {label:"5",desc:"样你能看到的东西",instr:"环顾四周，说出5样你能看到的东西"},
    {label:"4",desc:"样你能触碰的东西",instr:"触摸4样东西，感受它们的质地"},
    {label:"3",desc:"样你能听到的声音",instr:"仔细听，辨认出3种不同的声音"},
    {label:"2",desc:"种你能闻到的气味",instr:"闻一闻，尝试找出2种气味"},
    {label:"1",desc:"种你能尝到的味道",instr:"感受舌头上1种味道（即使只是口水味）"}
  ];
  var si = 0;
  var senseInt = setInterval(function(){
    if (si >= senses.length) {
      clearInterval(senseInt);
      document.getElementById("grounding-step").textContent = "你回来了。你在这里。";
      document.getElementById("grounding-hint").textContent = "这些声音是大脑的产物。你现在在安全的房间里。";
      return;
    }
    var s = senses[si];
    document.getElementById("grounding-step").textContent = s.label + " — " + s.desc;
    document.getElementById("grounding-hint").textContent = s.instr;
    var item = document.createElement("div"); item.className = "g5-item";
    item.style.animationDelay = (si * 0.15) + "s";
    item.innerHTML = '<strong style="font-size:18px;color:var(--text-primary);">' + s.label + '</strong><br>' + s.desc;
    document.getElementById("grounding-5").appendChild(item);
    si++;
  }, 5000);
  container._breathInt = breathInt;
  container._senseInt = senseInt;
}

function closeGrounding() {
  var c = document.getElementById("grounding-content");
  if (c._breathInt) clearInterval(c._breathInt);
  if (c._senseInt) clearInterval(c._senseInt);
  showScreen("game-screen");
  document.getElementById("voice-layer").classList.remove("hidden");
}

// ============================================================
// END SCREEN
// ============================================================
function showEndScreen() {
  state.sessionComplete = true;
  showScreen("end-screen");
  document.getElementById("voice-layer").classList.add("hidden");
  clearVoices();

  var aw = Math.min(100, state.score.awareness * 20 + 30);
  var cn = Math.min(100, state.score.connection * 35 + 20);
  var rs = Math.min(100, state.score.resilience * 30 + 20);

  document.getElementById("end-summary").innerHTML =
    '<div class="summary-card"><div class="summary-card-title">现实觉察</div><div class="summary-card-value">' + aw + '%</div><div class="summary-card-sub">识别幻觉与现实的能力</div></div>' +
    '<div class="summary-card"><div class="summary-card-title">人际连接</div><div class="summary-card-value">' + cn + '%</div><div class="summary-card-sub">主动与他人分享体验的意愿</div></div>' +
    '<div class="summary-card"><div class="summary-card-title">心理韧性</div><div class="summary-card-value">' + rs + '%</div><div class="summary-card-sub">面对声音时的应对与恢复力</div></div>' +
    '<div class="summary-card"><div class="summary-card-title">安全出口</div><div class="summary-card-value">' + state.groundingUsed + '次</div><div class="summary-card-sub">主动寻求支持的行为</div></div>';

  document.getElementById("end-therapy-note").innerHTML =
    '今天的旅程到这里结束了。<br><br>在真实治疗中，我们会花更多时间讨论每个场景。<br>你不需要记住所有应对技巧，只需要记住一件事：<br><br>' +
    '<strong style="color:var(--text-primary);font-size:15px;">当你听到那些声音，你不是孤独的。</strong><br><br>' +
    '治疗师在这里。家人在这里。<br>而你的内心，也有不同的声音在尝试帮助你。<br><br>下次见。';

  state.reportData = buildReportData();
}

// ============================================================
// REPORT SYSTEM
// ============================================================
function buildReportData() {
  var startStr = state.startTime ? state.startTime.toLocaleString("zh-CN",{year:"numeric",month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"}) : getTimestamp();
  var endStr = getTimestamp();
  var sceneRecords = state.selectedChoices.map(function(sc) {
    var voicesHtml = sc.voices.map(function(v) {
      var col = PERSONAS[v.persona] ? PERSONAS[v.persona].color : "#888";
      return '<span style="color:' + col + ';">[' + (PERSONAS[v.persona] ? PERSONAS[v.persona].name : v.persona) + ']</span> ' + escapeHtml(v.text);
    }).join("<br>");
    var gndHtml = sc.groundingUsed ? '<div class="grounding-record"><div class="grounding-label">&#9670; 触发安全出口 / grounding</div><div class="grounding-text">本次共使用安全出口 ' + state.groundingUsed + ' 次。</div></div>' : '';
    var noteHtml = sc.therapistNote ? '<div class="notes-record"><div class="notes-record-label">&#9998; 治疗师记录提示</div>' + escapeHtml(sc.therapistNote) + '</div>' : '';
    return '<div class="scene-record">' +
      '<div class="scene-record-name">' + escapeHtml(sc.sceneName || "") + '</div>' +
      '<div class="choice-record">' +
        '<div class="choice-label">选择 ' + escapeHtml(sc.choiceLetter) + '</div>' +
        '<div class="choice-text">' + escapeHtml(sc.choiceText) + '</div>' +
        (voicesHtml ? '<div class="voice-record">' + voicesHtml + '</div>' : '') +
      '</div>' + noteHtml + gndHtml + '</div>';
  }).join("");

  var allVoices = {};
  state.voiceHistory.forEach(function(v){
    if (!allVoices[v.persona]) allVoices[v.persona] = [];
    if (allVoices[v.persona].indexOf(v.text) === -1) allVoices[v.persona].push(v.text);
  });

  var followups = [];
  if (state.score.awareness >= 2) followups.push("患者展现出良好的现实检验意识，可进一步探讨其在真实生活中的检验频率与效果。");
  if (state.score.connection >= 1) followups.push("患者愿意向家人分享幻觉体验——建议后续安排家属Psychoeducation，建立家庭支持系统。");
  if (state.score.resilience >= 1) followups.push("患者展现了不同程度的应对策略，建议在下次治疗中详细回顾各策略的有效性。");
  if (state.groundingUsed > 0) followups.push("患者本次使用安全出口 " + state.groundingUsed + " 次，可讨论在实际生活中是否有类似的安全锚定行为。");
  if (state.voiceHistory.some(function(v){ return v.persona === "command"; }))
    followups.push("命令性幻听出现——建议关注命令内容是否涉及危险行为，建立安全计划（Crisis Plan）。");
  if (state.voiceHistory.some(function(v){ return v.persona === "half"; }))
    followups.push("「半吊子」(Half Light) 声音多次出现——建议关注患者的恐惧反应模式，是否存在被害妄想倾向。");
  if (state.voiceHistory.some(function(v){ return v.persona === "pale"; }))
    followups.push("「灰域」声音出现——提示虚无感或抑郁情绪，建议关注患者的情感状态，评估抑郁风险。");
  if (state.voiceHistory.some(function(v){ return v.persona === "thought"; }))
    followups.push("「思维插入」声音出现——建议详细讨论思维障碍的具体内容，评估认知功能状态。");
  if (followups.length === 0) followups.push("建议在下次治疗中回顾本次体验，讨论患者最印象深刻的场景和声音。");
  followups.push("可结合 PANSS 量表进行标准化评估，建立基线数据。");

  var aw = Math.min(100, state.score.awareness * 20 + 30);
  var cn = Math.min(100, state.score.connection * 35 + 20);
  var rs = Math.min(100, state.score.resilience * 30 + 20);

  return { startTime:startStr, endTime:endStr, scoreAwareness:aw, scoreConnection:cn, scoreResilience:rs,
    groundingUsed:state.groundingUsed, sceneRecords:sceneRecords, allVoices:allVoices,
    followups:followups, choices:state.selectedChoices };
}

function showReport() {
  var rd = state.reportData || buildReportData();
  var body = document.getElementById("report-body");
  body.innerHTML =
    '<div class="report-section"><div class="report-section-title">基本信息</div><div class="report-meta">' +
    '<div class="report-meta-item"><div class="report-meta-label">开始时间</div><div class="report-meta-value">' + escapeHtml(rd.startTime) + '</div></div>' +
    '<div class="report-meta-item"><div class="report-meta-label">结束时间</div><div class="report-meta-value">' + escapeHtml(rd.endTime) + '</div></div>' +
    '<div class="report-meta-item"><div class="report-meta-label">场景完成</div><div class="report-meta-value">' + rd.choices.length + ' / ' + SCENES.length + '</div></div>' +
    '</div></div>' +
    '<div class="report-section"><div class="report-section-title">评估维度</div><div class="report-scores">' +
    '<div class="score-item"><div class="score-label">现实觉察</div><div class="score-value">' + rd.scoreAwareness + '%</div><div class="score-bar"><div class="score-bar-fill" style="width:' + rd.scoreAwareness + '%"></div></div></div>' +
    '<div class="score-item"><div class="score-label">人际连接</div><div class="score-value">' + rd.scoreConnection + '%</div><div class="score-bar"><div class="score-bar-fill" style="width:' + rd.scoreConnection + '%"></div></div></div>' +
    '<div class="score-item"><div class="score-label">心理韧性</div><div class="score-value">' + rd.scoreResilience + '%</div><div class="score-bar"><div class="score-bar-fill" style="width:' + rd.scoreResilience + '%"></div></div></div>' +
    '<div class="score-item"><div class="score-label">安全出口</div><div class="score-value">' + rd.groundingUsed + '<span style="font-size:14px">次</span></div><div class="score-bar"><div class="score-bar-fill" style="width:' + Math.min(100,rd.groundingUsed*20) + '%;background:#c0392b"></div></div></div>' +
    '</div></div>' +
    '<div class="report-section"><div class="report-section-title">场景记录与选择详情</div>' + rd.sceneRecords + '</div>' +
    '<div class="report-section"><div class="report-section-title">人格声音接触记录</div>' +
    '<div style="font-size:13px;color:var(--text-secondary);line-height:2;background:var(--bg-input);border:1px solid var(--border-light);padding:16px">' +
    Object.keys(rd.allVoices).map(function(k) {
      var col = PERSONAS[k] ? PERSONAS[k].color : "#888";
      return '<div style="margin-bottom:8px"><span style="color:' + col + ';">' + escapeHtml(PERSONAS[k] ? PERSONAS[k].name : k) + '</span> — 共出现 ' + rd.allVoices[k].length + ' 次</div>';
    }).join("") + '</div></div>';
  document.getElementById("report-followup").innerHTML = rd.followups.map(function(f){ return "<li>" + escapeHtml(f) + "</li>"; }).join("");
  document.getElementById("report-overlay").classList.remove("hidden");
  document.getElementById("report-overlay").style.display = "flex";
}

function closeReport() {
  document.getElementById("report-overlay").classList.add("hidden");
  document.getElementById("report-overlay").style.display = "none";
}

function downloadReportTxt() {
  var rd = state.reportData || buildReportData();
  var lines = [];
  lines.push("========================================");
  lines.push("灰域行者 · 治疗记录");
  lines.push("GREY ZONE WALKER · THERAPY SESSION REPORT");
  lines.push("========================================");
  lines.push("");
  lines.push("【基本信息】");
  lines.push("记录时间：" + rd.startTime + " 至 " + rd.endTime);
  lines.push("场景完成：" + rd.choices.length + " / " + SCENES.length);
  lines.push("");
  lines.push("【评估维度】");
  lines.push("现实觉察：" + rd.scoreAwareness + "%");
  lines.push("人际连接：" + rd.scoreConnection + "%");
  lines.push("心理韧性：" + rd.scoreResilience + "%");
  lines.push("安全出口使用：" + rd.groundingUsed + "次");
  lines.push("");
  lines.push("【场景记录】");
  rd.choices.forEach(function(sc) {
    lines.push("");
    lines.push("── " + sc.sceneName + " ──");
    lines.push("选择 " + sc.choiceLetter + "：" + sc.choiceText);
    lines.push("结果：" + sc.outcome);
    if (sc.voices && sc.voices.length) {
      lines.push("人格声音回应：");
      sc.voices.forEach(function(v){ lines.push("  · [" + (PERSONAS[v.persona]?PERSONAS[v.persona].name:v.persona) + "] " + v.text); });
    }
    if (sc.groundingUsed) lines.push("[使用安全出口 / grounding]");
    if (sc.therapistNote) lines.push("治疗师提示：" + sc.therapistNote);
  });
  lines.push("");
  lines.push("【建议后续讨论主题】");
  rd.followups.forEach(function(f,i){ lines.push((i+1) + ". " + f); });
  lines.push("");
  lines.push("========================================");
  lines.push("本记录由灰域行者治疗游戏自动生成");
  lines.push("生成时间：" + new Date().toLocaleString("zh-CN"));
  var txt = lines.join("\n");
  var blob = new Blob([txt],{type:"text/plain;charset=utf-8"});
  var url = URL.createObjectURL(blob);
  var a = document.createElement("a"); a.href = url;
  a.download = "灰域行者_治疗记录_" + getTimestamp().replace(/[ :]/g,"-") + ".txt";
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function printReport() { window.print(); }

// ============================================================
// START / RESTART
// ============================================================
function startGame() {
  state = {
    currentScene:0, score:{awareness:0,connection:0,resilience:0,voiceCount:0},
    selectedChoices:[], groundingUsed:0, voiceHistory:[],
    sessionComplete:false, startTime:new Date(), reportData:null, currentTheme:state.currentTheme,
    activeBubbles:[]
  };
  renderScene();
}

function restartGame() { showScreen("intro-screen"); clearVoices(); }

// ============================================================
// KEYBOARD
// ============================================================
document.addEventListener("keydown", function(e) {
  if (e.key === "Escape" && !document.getElementById("grounding-screen").classList.contains("hidden")) closeGrounding();
  if (e.key === "Escape" && !document.getElementById("game-screen").classList.contains("hidden")) openGrounding();
  if (e.key === "Escape" && !document.getElementById("report-overlay").classList.contains("hidden")) closeReport();
});
</script>
